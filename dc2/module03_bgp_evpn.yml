---
# =============================================================================
# MusterBank AG — DC2 Nürnberg
# module03_bgp_evpn.yml
#
# Configures MP-BGP EVPN peering on all DC2 fabric devices, using the
# IS-IS underlay (module02) for loopback reachability between peers.
# Mirrors dc1/module03_bgp_evpn.yml exactly — same design, same group-
# derived neighbor logic — using DC2's own AS (65002) and addressing.
#
# Design (verified manually via CLI before this module was written):
#   - iBGP, single AS 65002 (bgp_as, from dc2_fabric.yml)
#   - Spines (dc2_spines) = Route Reflectors, peer with every leaf/border
#     device, route-reflector-client + retain route-target all
#   - Leafs (dc2_leaves + dc2_border) = RR clients, peer with both spines
#   - Peering source: Loopback0 (update-source loopback0)
#   - Address family: l2vpn evpn only (no ipv4 unicast needed for EVPN)
#
# Required features (same as DC1 — feature bgp alone does NOT expose the
# l2vpn evpn address-family; nv overlay evpn is required too):
#   feature bgp
#   nv overlay evpn
#
# Community handling: same as DC1 — NX-OS expands "send-community both"
# into two separate running-config lines, "send-community" and
# "send-community extended". This module declares both lines explicitly
# to match what actually persists on the device.
#
# Neighbor derivation: identical pattern to DC1 — neighbors are computed
# from inventory group membership, not stored in host_vars. N-LEAF-05
# lives in dc2_border (not dc2_leaves), so dc2_all_leafs combines both
# groups, same as dc1_all_leafs did for F-LEAF-05.
#
# Run: ansible-playbook dc2/module03_bgp_evpn.yml -i dc2/inventory/hosts.ini
# AWX: Job Template → MusterBank-DC2-BGP-EVPN
# =============================================================================

- name: "DC2 Nürnberg — Configure MP-BGP EVPN Peering (Phase 2)"
  hosts: dc2_fabric
  gather_facts: false

  vars:
    # Combined leaf/border group — N-LEAF-05 lives in dc2_border, not
    # dc2_leaves, so both groups must be combined to get "all leafs".
    dc2_all_leafs: "{{ groups['dc2_leaves'] + groups['dc2_border'] }}"

    # Each host computes its own EVPN neighbor list based on which
    # inventory group it belongs to.
    bgp_evpn_neighbors: >-
      {{
        (groups['dc2_spines'])
        if inventory_hostname in dc2_all_leafs
        else dc2_all_leafs
      }}

    # Spines act as route reflectors for their leaf/border neighbors.
    is_route_reflector: "{{ inventory_hostname in groups['dc2_spines'] }}"

  tasks:

    # -------------------------------------------------------------------------
    # STEP 1 — Enable required features
    # -------------------------------------------------------------------------
    - name: Enable feature bgp
      cisco.nxos.nxos_feature:
        feature: bgp
        state: enabled

    - name: Enable nv overlay evpn
      cisco.nxos.nxos_config:
        lines:
          - "nv overlay evpn"

    # -------------------------------------------------------------------------
    # STEP 2 — router bgp <AS>: router-id
    # -------------------------------------------------------------------------
    - name: Configure router bgp — router-id
      cisco.nxos.nxos_config:
        lines:
          - "router-id {{ loopback0_ip }}"
        parents: "router bgp {{ bgp_as }}"

    # -------------------------------------------------------------------------
    # STEP 3 — Route reflectors only: retain route-target all
    # -------------------------------------------------------------------------
    - name: "Spines only — configure retain route-target all"
      cisco.nxos.nxos_config:
        lines:
          - "retain route-target all"
        parents:
          - "router bgp {{ bgp_as }}"
          - "address-family l2vpn evpn"
      when: is_route_reflector

    # -------------------------------------------------------------------------
    # STEP 4 — Per-neighbor configuration (one task per neighbor in the
    # computed bgp_evpn_neighbors list)
    # -------------------------------------------------------------------------
    - name: Configure BGP neighbor — remote-as and update-source
      cisco.nxos.nxos_config:
        lines:
          - "remote-as {{ bgp_as }}"
          - "update-source loopback0"
        parents:
          - "router bgp {{ bgp_as }}"
          - "neighbor {{ hostvars[item].loopback0_ip }}"
      loop: "{{ bgp_evpn_neighbors }}"
      loop_control:
        label: "neighbor {{ hostvars[item].loopback0_ip }} ({{ item }})"

    - name: Configure BGP neighbor — l2vpn evpn address-family (send-community)
      cisco.nxos.nxos_config:
        lines:
          - "send-community"
          - "send-community extended"
        parents:
          - "router bgp {{ bgp_as }}"
          - "neighbor {{ hostvars[item].loopback0_ip }}"
          - "address-family l2vpn evpn"
      loop: "{{ bgp_evpn_neighbors }}"
      loop_control:
        label: "neighbor {{ hostvars[item].loopback0_ip }} ({{ item }})"

    - name: "Spines only — set route-reflector-client per neighbor"
      cisco.nxos.nxos_config:
        lines:
          - "route-reflector-client"
        parents:
          - "router bgp {{ bgp_as }}"
          - "neighbor {{ hostvars[item].loopback0_ip }}"
          - "address-family l2vpn evpn"
      loop: "{{ bgp_evpn_neighbors }}"
      loop_control:
        label: "neighbor {{ hostvars[item].loopback0_ip }} ({{ item }})"
      when: is_route_reflector

    # -------------------------------------------------------------------------
    # STEP 5 — Save configuration (EVE-NG persistence workaround)
    # -------------------------------------------------------------------------
    - name: Save running-config to startup-config
      cisco.nxos.nxos_command:
        commands:
          - command: "copy running-config startup-config"
            prompt: "Copy complete"
            answer: ""
      register: save_result

    - name: Confirm save succeeded
      debug:
        msg: "{{ inventory_hostname }}: BGP EVPN peering configured and saved"
      when: save_result is succeeded

    # -------------------------------------------------------------------------
    # STEP 6 — Verification
    # -------------------------------------------------------------------------
    - name: Verify BGP L2VPN EVPN summary
      cisco.nxos.nxos_command:
        commands:
          - show bgp l2vpn evpn summary
      register: bgp_evpn_summary

    - name: Display BGP L2VPN EVPN summary
      debug:
        msg: "{{ inventory_hostname }} BGP EVPN summary:\n{{ bgp_evpn_summary.stdout[0] }}"

    - name: Module summary
      debug:
        msg: >
          {{ inventory_hostname }} — BGP EVPN configured as
          {{ 'Route Reflector' if is_route_reflector else 'RR Client' }}
          with {{ bgp_evpn_neighbors | length }} neighbor(s):
          {{ bgp_evpn_neighbors | join(', ') }}
