[dc2_nxos_spines]
N-SPINE-01 ansible_host=192.168.1.31
N-SPINE-02 ansible_host=192.168.1.32

[dc2_nxos_leafs]
N-LEAF-01 ansible_host=192.168.1.51
N-LEAF-02 ansible_host=192.168.1.52
N-LEAF-03 ansible_host=192.168.1.53
N-LEAF-04 ansible_host=192.168.1.54
N-LEAF-05 ansible_host=192.168.1.55

