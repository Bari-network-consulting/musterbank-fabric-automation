---
- name: "DC2 Nürnberg — Save & Backup NX-OS Fabric"
  hosts: dc2_fabric
  gather_facts: false

  vars:
    backup_root: "/opt/backups/musterbank/dc2"

  tasks:

    - name: Set backup timestamp (once, consistent across all tasks)
      set_fact:
        backup_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
      run_once: true
      delegate_to: localhost

    - name: Create backup directory
      file:
        path: "{{ backup_root }}/{{ inventory_hostname }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

    - name: Copy running-config to startup-config
      cisco.nxos.nxos_command:
        commands:
          - command: "copy running-config startup-config"
            prompt: "Copy complete"
            answer: ""
      register: save_result

    - name: Fetch running-config
      cisco.nxos.nxos_command:
        commands:
          - show running-config
      register: running_config

    - name: Write timestamped backup
      copy:
        content: "{{ running_config.stdout[0] }}"
        dest: "{{ backup_root }}/{{ inventory_hostname }}/{{ backup_timestamp }}.cfg"
        mode: '0644'
      delegate_to: localhost

    - name: Update latest.cfg symlink
      file:
        src: "{{ backup_root }}/{{ inventory_hostname }}/{{ backup_timestamp }}.cfg"
        dest: "{{ backup_root }}/{{ inventory_hostname }}/latest.cfg"
        state: link
        force: true
      delegate_to: localhost

    - name: Summary
      debug:
        msg: "{{ inventory_hostname }} — saved + backed up to {{ backup_root }}/{{ inventory_hostname }}/{{ backup_timestamp }}.cfg"


- name: "DC2 Nürnberg — Save & Backup IOS Servers"
  hosts: dc2_ios
  gather_facts: false

  vars:
    backup_root: "/opt/backups/musterbank/dc2/servers"

  tasks:

    - name: Set backup timestamp (once, consistent across all tasks)
      set_fact:
        backup_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
      run_once: true
      delegate_to: localhost

    - name: Create backup directory
      file:
        path: "{{ backup_root }}/{{ inventory_hostname }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

    - name: Save running-config to NVRAM
      cisco.ios.ios_command:
        commands:
          - write memory
      register: save_result

    - name: Fetch running-config
      cisco.ios.ios_command:
        commands:
          - show running-config
      register: running_config

    - name: Write timestamped backup
      copy:
        content: "{{ running_config.stdout[0] }}"
        dest: "{{ backup_root }}/{{ inventory_hostname }}/{{ backup_timestamp }}.cfg"
        mode: '0644'
      delegate_to: localhost

    - name: Update latest.cfg symlink
      file:
        src: "{{ backup_root }}/{{ inventory_hostname }}/{{ backup_timestamp }}.cfg"
        dest: "{{ backup_root }}/{{ inventory_hostname }}/latest.cfg"
        state: link
        force: true
      delegate_to: localhost

    - name: Summary
      debug:
        msg: "{{ inventory_hostname }} — NVRAM saved + backed up to {{ backup_root }}/{{ inventory_hostname }}/{{ backup_timestamp }}.cfg"
