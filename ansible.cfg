[defaults]
inventory           = inventory/hosts.ini
remote_user         = admin
host_key_checking   = False
retry_files_enabled = False
stdout_callback     = yaml
timeout             = 30
deprecation_warnings = False

[persistent_connection]
connect_timeout     = 30
command_timeout     = 30

[ssh_connection]
ssh_args = -o KexAlgorithms=+diffie-hellman-group-exchange-sha1,diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa -o StrictHostKeyChecking=no
